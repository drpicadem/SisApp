services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: sisapp-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    networks:
      - sisapp-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: sisapp-rabbitmq
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - sisapp-network

  # Main API Service
  sisapp-api:
    build:
      context: ./backend/ŠišAppApi
      dockerfile: Dockerfile
    container_name: sisapp-api
    depends_on:
      - rabbitmq
      - sqlserver
    ports:
      - "7100:8080" # Exposed port
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - RabbitMQ__Host=${RABBITMQ_HOST}
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpirationInMinutes=${JWT_EXPIRATION}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}
      - EmailSettings__SenderEmail=${SENDER_EMAIL}
      - EmailSettings__SenderPassword=${SENDER_PASSWORD}
      - EmailSettings__SmtpServer=${SMTP_SERVER}
      - EmailSettings__SmtpPort=${SMTP_PORT}
      - PayPal__ClientId=${PAYPAL_CLIENT_ID}
      - PayPal__Secret=${PAYPAL_SECRET}
      - PayPal__BaseUrl=${PAYPAL_BASE_URL}
    networks:
      - sisapp-network

  # Helper Service (Worker)
  sisapp-helper:
    build:
      context: ./backend/ŠišApp.Helper
      dockerfile: Dockerfile
    container_name: sisapp-helper
    depends_on:
      - rabbitmq
      - sisapp-api
    environment:
      - RabbitMQ__Host=${RABBITMQ_HOST}
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
      - EmailSettings__SenderEmail=${SENDER_EMAIL}
      - EmailSettings__SenderPassword=${SENDER_PASSWORD}
      - EmailSettings__SmtpServer=${SMTP_SERVER}
      - EmailSettings__SmtpPort=${SMTP_PORT}
    networks:
      - sisapp-network

networks:
  sisapp-network:
    driver: bridge

volumes:
  sqlvolume:
